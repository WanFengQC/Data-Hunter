services:
  mongo:
    image: mongo:7
    container_name: data-hunter-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: data-hunter-backend
    restart: unless-stopped
    env_file:
      - .env.example
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: data-hunter-frontend
    restart: unless-stopped
    environment:
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
