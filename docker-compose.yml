services:
  backend:
    build:
      context: ./backend
    container_name: data-hunter-backend
    restart: unless-stopped
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: data-hunter-frontend
    restart: unless-stopped
    environment:
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
