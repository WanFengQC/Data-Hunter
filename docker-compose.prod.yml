services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: data-hunter-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    networks:
      - data_hunter_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: data-hunter-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "18080:80"
    networks:
      - data_hunter_net

networks:
  data_hunter_net:
    driver: bridge
